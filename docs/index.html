<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>슬라이드 뷰어 | CSF Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c0:#fdfaf5;--c1:#f4ead8;--c2:#e8d9c0;--c3:#d9c4a2;
  --red:#b83020;--red2:#9a2818;--redlt:#fdf0ee;
  --brn:#7a4f2e;
  --t1:#1e0f06;--t2:#5a3318;--t3:#8c6040;--t4:#b8926a;
  --bl:rgba(140,96,64,.14);--bm:rgba(140,96,64,.26);--bh:rgba(140,96,64,.44);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--c1);
  font-family:'Noto Sans KR',sans-serif;color:var(--t1)}
button{font-family:inherit;cursor:pointer;background:none;border:none}

/* ── LAYOUT ───────────────────────────────── */
#app{display:grid;grid-template-rows:54px 1fr;grid-template-columns:220px 1fr;
  width:100vw;height:100vh}

/* ── HEADER ───────────────────────────────── */
#hd{grid-column:1/-1;background:var(--c0);border-bottom:1px solid var(--bm);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:20}
.hl{display:flex;align-items:center;gap:12px}
.logo{font-family:'DM Serif Display',serif;font-size:17px;color:var(--red);letter-spacing:.08em}
.pipe{width:1px;height:16px;background:var(--bh)}
.fname{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--t2);
  letter-spacing:.06em;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hr2{display:flex;align-items:center;gap:16px}
.hhome{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--brn);
  border:1px solid var(--bh);background:var(--c1);border-radius:6px;padding:6px 12px;transition:all .15s}
.hhome:hover{background:var(--redlt);border-color:var(--red);color:var(--red2)}
.htot{font-size:11px;color:var(--t4);font-family:'Cormorant Garamond',serif;letter-spacing:.12em}
.hcnt{font-family:'DM Serif Display',serif;font-size:24px;color:var(--red);line-height:1}
.hcnt em{font-size:13px;color:var(--t3);font-style:normal;margin-left:2px}

/* ── SIDEBAR ──────────────────────────────── */
#sb{background:var(--c0);border-right:1px solid var(--bm);display:flex;flex-direction:column;overflow:hidden}
.sbhd{padding:12px 16px 9px;border-bottom:1px solid var(--bl);display:flex;align-items:center;gap:6px;flex-shrink:0}
.sbhd i{font-size:13px;color:var(--red)}
.sbhd span{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--t3)}
#list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--c3) transparent}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-thumb{background:var(--c3);border-radius:2px}
.si{display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;
  border-left:3px solid transparent;transition:background .13s;user-select:none}
.si:hover{background:rgba(184,48,32,.05)}
.si.on{background:rgba(184,48,32,.09);border-left-color:var(--red)}
.si-n{font-family:'DM Serif Display',serif;font-size:12px;color:var(--t4);min-width:18px;flex-shrink:0;transition:color .13s}
.si.on .si-n{color:var(--red)}
.si-th{width:52px;height:33px;background:var(--c2);border:1px solid var(--bm);border-radius:2px;
  flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.si-th img{width:100%;height:100%;object-fit:cover;display:block}
.si-ph{font-family:'DM Serif Display',serif;font-size:9px;color:var(--t4)}
.si-ttl{font-size:11px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.si.on .si-ttl{color:var(--t1);font-weight:500}

/* ── VIEWER ───────────────────────────────── */
#view{grid-row:2;grid-column:2;display:flex;flex-direction:column;overflow:hidden}
#stage{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 60% 40%,#e8dbc5,#d8c8a8)}

/* ── SLIDE TRANSITION ─────────────────────── */
.wcs{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateX(28px);pointer-events:none;
  transition:opacity .28s cubic-bezier(.4,0,.2,1),transform .28s cubic-bezier(.4,0,.2,1)}
.wcs.on{opacity:1;transform:none;pointer-events:auto}
.wcs.out{opacity:0;transform:translateX(-28px);transition:opacity .17s,transform .17s}

/* ── SLIDE SURFACE ────────────────────────── */
.ssw{position:relative;flex-shrink:0}
.simg{display:block;width:100%;height:100%;object-fit:contain;
  image-rendering:high-quality;background:#fff;
  box-shadow:0 3px 40px rgba(30,15,6,.22),0 1px 3px rgba(30,15,6,.1)}
.ssw.loading::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 25%,rgba(255,255,255,.55) 50%,transparent 75%);
  background-size:200% 100%;animation:shim 1.1s infinite;pointer-events:none}
@keyframes shim{from{background-position:200% 0}to{background-position:-200% 0}}

/* ── 오버레이 (PPT 내부 링크 / 동영상) ────── */
.ovwrap{position:absolute;inset:0;pointer-events:none;z-index:5}
.ov-link{position:absolute;background:rgba(184,48,32,0);
  outline:0 solid rgba(184,48,32,.5);border-radius:3px;
  cursor:pointer;pointer-events:auto;transition:background .15s,outline-width .15s}
.ov-link:hover{background:rgba(184,48,32,.1);outline-width:2px}
.ov-video{position:absolute;pointer-events:auto;background:#000;
  border-radius:2px;box-shadow:0 2px 10px rgba(0,0,0,.3)}

/* ── OVERLAY BUTTONS ──────────────────────── */
.sov{position:absolute;top:8px;right:8px;display:flex;gap:5px;z-index:20;
  opacity:0;transition:opacity .16s;pointer-events:none}
.ssw:hover .sov,.sov:focus-within{opacity:1;pointer-events:auto}
.sovbtn{width:32px;height:32px;border-radius:7px;
  background:rgba(253,250,245,.82);backdrop-filter:blur(8px);
  color:var(--t2);font-size:15px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 5px rgba(30,15,6,.15);transition:all .15s}
.sovbtn:hover,.sovbtn.act{background:var(--red);color:#fff;box-shadow:0 2px 8px rgba(184,48,32,.35)}

/* ── NAV ARROWS ───────────────────────────── */
.nva{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:72px;
  display:flex;align-items:center;justify-content:center;z-index:10;
  background:rgba(253,250,245,.82);border:1px solid var(--bm);color:var(--brn);
  font-size:21px;transition:all .17s;backdrop-filter:blur(4px)}
.nva:hover{background:var(--red);color:#fff;border-color:var(--red)}
#arL{left:0;border-radius:0 7px 7px 0}
#arR{right:0;border-radius:7px 0 0 7px}

/* ── CONTROL BAR ──────────────────────────── */
#ctrl{background:var(--c0);border-top:1px solid var(--bm);padding:7px 15px;
  display:flex;align-items:center;gap:9px;flex-shrink:0;height:52px}
.cbtn{width:34px;height:34px;border-radius:6px;background:var(--c1);border:1px solid var(--bm);
  color:var(--brn);font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0}
.cbtn:hover{background:var(--red);color:#fff;border-color:var(--red)}
.cnav{display:flex;gap:4px}
.cprog{flex:1;height:4px;background:var(--c3);border-radius:2px;overflow:hidden;cursor:pointer}
.cpf{height:100%;background:var(--red);border-radius:2px;transition:width .24s}
.cpinfo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--t2);
  min-width:65px;text-align:right;white-space:nowrap}
.cpinfo strong{color:var(--red)}

/* ── FULLSCREEN ───────────────────────────── */
#fsov{display:none;position:fixed;inset:0;z-index:300;background:#0c0b09;
  align-items:center;justify-content:center}
#fsov.open{display:flex}
#fssw{position:relative;flex-shrink:0}
#fsimg{display:block;width:100%;height:100%;object-fit:contain;
  image-rendering:high-quality;background:#fff}
#fssw .sov{opacity:1;pointer-events:auto;top:10px;right:10px}
#fscls{position:fixed;top:16px;right:18px;width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;
  transition:background .15s;z-index:301}
#fscls:hover{background:rgba(184,48,32,.75)}
.fsnv{position:fixed;top:50%;transform:translateY(-50%);width:48px;height:88px;
  display:flex;align-items:center;justify-content:center;z-index:301;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.7);font-size:23px;transition:all .17s}
.fsnv:hover{background:var(--red);color:#fff;border-color:var(--red)}
#fnL{left:0;border-radius:0 9px 9px 0}
#fnR{right:0;border-radius:9px 0 0 9px}
.fscnt{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font-family:'DM Serif Display',serif;font-size:18px;
  color:rgba(255,255,255,.42);z-index:301;letter-spacing:.06em}

/* ── WELCOME / DECK LIST ──────────────────── */
#wlc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;
  overflow-y:auto;padding:40px 20px}
#wlc.gone{display:none}
.wdec{font-family:'DM Serif Display',serif;font-size:110px;color:rgba(184,48,32,.04);
  position:absolute;right:3%;bottom:0;letter-spacing:.08em;user-select:none;pointer-events:none}
.wico{font-size:46px;color:var(--red);opacity:.38;margin-bottom:14px}
.wmain{font-family:'DM Serif Display',serif;font-size:26px;color:var(--t1);margin-bottom:7px}
.wsub{font-size:13px;color:var(--t3);text-align:center;line-height:1.7;margin-bottom:26px;max-width:420px}
.wsub code{background:var(--c2);padding:1px 6px;border-radius:4px;font-size:12px}

/* 덱 카드 목록 */
.decklist{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:14px;width:100%;max-width:900px}
.deckcard{background:var(--c0);border:1px solid var(--bm);border-radius:10px;
  padding:16px;text-align:left;transition:all .17s;cursor:pointer;
  display:flex;flex-direction:column;gap:8px}
.deckcard:hover{border-color:var(--red);box-shadow:0 6px 18px rgba(30,15,6,.1);transform:translateY(-2px)}
.dc-ico{font-size:22px;color:var(--red)}
.dc-ttl{font-family:'DM Serif Display',serif;font-size:15px;color:var(--t1);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dc-meta{font-size:11px;color:var(--t4);letter-spacing:.04em}
.wempty{font-size:12px;color:var(--t4);text-align:center;line-height:1.9;max-width:420px}
.wempty code{background:var(--c2);padding:1px 6px;border-radius:4px}
.wsrv{margin-top:18px;padding:7px 18px;border-radius:6px;font-size:12px;letter-spacing:.02em}
.wsrv.ok{background:rgba(39,174,96,.1);color:#1a7a40;border:1px solid rgba(39,174,96,.2)}
.wsrv.err{background:rgba(184,48,32,.07);color:var(--red2);border:1px solid rgba(184,48,32,.18)}

/* ── LOADING ──────────────────────────────── */
#ldov{position:fixed;inset:0;background:rgba(253,250,245,.95);display:none;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:200;gap:14px;backdrop-filter:blur(3px)}
#ldov.on{display:flex}
.ldspn{width:44px;height:44px;border:3px solid var(--c3);border-top-color:var(--red);
  border-radius:50%;animation:spin .85s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldttl{font-family:'DM Serif Display',serif;font-size:20px;color:var(--t1)}
.ldsub{font-size:12px;color:var(--t3);letter-spacing:.05em;min-height:1.2em;text-align:center}
</style>
</head>
<body>
<div id="app">
  <!-- 헤더 -->
  <header id="hd">
    <div class="hl">
      <span class="logo">CSF Group</span>
      <div class="pipe"></div>
      <span class="fname" id="fname">슬라이드 뷰어</span>
    </div>
    <div class="hr2">
      <button class="hhome" id="homeBtn" style="display:none">
        <i class="ti ti-layout-grid"></i> 목록
      </button>
      <span class="htot" id="htot"></span>
      <div class="hcnt" id="hcnt"></div>
    </div>
  </header>

  <!-- 사이드바 -->
  <aside id="sb">
    <div class="sbhd"><i class="ti ti-layout-list"></i><span>목차</span></div>
    <div id="list"></div>
  </aside>

  <!-- 메인 뷰어 -->
  <main id="view">
    <div id="stage">
      <button class="nva" id="arL"><i class="ti ti-chevron-left"></i></button>
      <button class="nva" id="arR"><i class="ti ti-chevron-right"></i></button>

      <!-- 웰컴 / 덱 목록 화면 -->
      <div id="wlc">
        <div class="wdec">CSF</div>
        <i class="ti ti-presentation wico"></i>
        <div class="wmain" id="wmainTxt">발표자료를 선택하세요</div>
        <div class="wsub" id="wsubTxt">이 목록은 저장소의 <code>pptx/</code> 폴더에 파일을 올리면 자동으로 갱신됩니다</div>
        <div id="decklist" class="decklist"></div>
        <div id="empty" class="wempty" style="display:none">
          아직 표시할 발표자료가 없습니다.<br>
          깃허브 저장소의 <code>pptx/</code> 폴더에 .pptx 또는 .pdf 파일을 올려보세요.<br>
          업로드 후 1~3분 정도 지나면 자동으로 변환되어 여기 나타납니다.
        </div>
        <div id="srvbadge" class="wsrv err" style="display:none"></div>
      </div>
    </div>

    <!-- 컨트롤 바 -->
    <div id="ctrl">
      <div class="cnav">
        <button class="cbtn" id="prevBtn" title="이전 (←)"><i class="ti ti-chevron-left"></i></button>
        <button class="cbtn" id="nextBtn" title="다음 (→)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cprog" id="prog"><div class="cpf" id="cpf"></div></div>
      <div class="cpinfo" id="pinfo"></div>
    </div>
  </main>
</div>

<!-- 전체화면 오버레이 -->
<div id="fsov">
  <button id="fscls"><i class="ti ti-x"></i></button>
  <button class="fsnv" id="fnL"><i class="ti ti-chevron-left"></i></button>
  <div id="fssw">
    <img id="fsimg" src="" alt="">
    <div class="sov">
      <button class="sovbtn act" title="전체화면 닫기 (Esc / F)" onclick="closeFs()">
        <i class="ti ti-minimize"></i>
      </button>
    </div>
  </div>
  <button class="fsnv" id="fnR"><i class="ti ti-chevron-right"></i></button>
  <div class="fscnt" id="fscnt"></div>
</div>

<!-- 로딩 오버레이 -->
<div id="ldov">
  <div class="ldspn"></div>
  <div class="ldttl" id="ldttl">불러오는 중</div>
  <div class="ldsub" id="ldsub"></div>
</div>

<script>
/* ── 상태 ────────────────────────────────── */
let manifest = null, slides = [], cur = 0, ratio = 16 / 9;
const $ = id => document.getElementById(id);
const stage=$('stage'), listEl=$('list'), cpf=$('cpf'), pinfo=$('pinfo'),
      hcnt=$('hcnt'), htot=$('htot'), fnameEl=$('fname'),
      wlc=$('wlc'), decklistEl=$('decklist'), emptyEl=$('empty'),
      ldov=$('ldov'), ldttl=$('ldttl'), ldsub=$('ldsub'),
      fsov=$('fsov'), fssw=$('fssw'), fsimg=$('fsimg'), fscnt=$('fscnt'),
      homeBtn=$('homeBtn');

function showLd(t, s) { ldttl.textContent = t; ldsub.textContent = s || ''; ldov.classList.add('on'); }
function hideLd() { ldov.classList.remove('on'); }

/* ── 매니페스트(발표자료 목록) 불러오기 ──── */
async function loadManifest() {
  showLd('목록 불러오는 중', '');
  try {
    const r = await fetch('./manifest.json', { cache: 'no-store' });
    if (!r.ok) throw new Error('manifest.json 을 찾을 수 없습니다');
    manifest = await r.json();
  } catch (e) {
    manifest = { decks: [] };
    const b = $('srvbadge');
    b.style.display = 'inline-block';
    b.className = 'wsrv err';
    b.textContent = '✗ manifest.json 을 불러오지 못했습니다. GitHub Pages 설정을 확인하세요.';
  }
  hideLd();
  renderDeckList();
}

function renderDeckList() {
  const decks = manifest.decks || [];
  decklistEl.innerHTML = '';
  if (!decks.length) {
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';
  decks.forEach(d => {
    const icon = d.source_type === 'pdf' ? 'ti-file-type-pdf' : 'ti-file-type-ppt';
    const card = document.createElement('button');
    card.className = 'deckcard';
    card.innerHTML = `
      <i class="ti ${icon} dc-ico"></i>
      <span class="dc-ttl">${d.title || d.filename}</span>
      <span class="dc-meta">${d.slide_count}장</span>`;
    card.addEventListener('click', () => openDeck(d));
    decklistEl.appendChild(card);
  });
}

function openDeck(deck) {
  slides = deck.slides.map(s => ({
    url: `./${s.url}`,
    title: `슬라이드 ${s.index}`,
    overlays: (s.overlays || []).map(o => o.type === 'video'
      ? { ...o, src: `./${o.src}` }
      : o),
  }));
  ratio = deck.aspect_ratio || 16 / 9;
  homeBtn.style.display = 'flex';
  buildViewer(deck.title || deck.filename);
}

homeBtn.addEventListener('click', () => {
  homeBtn.style.display = 'none';
  fnameEl.textContent = '슬라이드 뷰어';
  htot.textContent = '';
  hcnt.textContent = '';
  stage.querySelectorAll('.wcs').forEach(e => e.remove());
  listEl.innerHTML = '';
  wlc.classList.remove('gone');
});

/* ── 오버레이(링크/동영상) 요소 생성 ────── */
function makeOverlayEl(o) {
  if (o.type === 'video') {
    const v = document.createElement('video');
    v.className = 'ov-video';
    v.src = o.src;
    v.controls = true;
    v.playsInline = true;
    v.style.left = o.x + '%';
    v.style.top = o.y + '%';
    v.style.width = o.w + '%';
    v.style.height = o.h + '%';
    v.addEventListener('play', () => { v.closest('.wcs')?.querySelectorAll('video').forEach(other => { if (other !== v) other.pause(); }); });
    return v;
  }
  const el = document.createElement('div');
  el.className = 'ov-link';
  el.style.left = o.x + '%';
  el.style.top = o.y + '%';
  el.style.width = o.w + '%';
  el.style.height = o.h + '%';
  const t = o.target || {};
  el.title = t.kind === 'external' ? '링크 열기 (새 탭)' : '슬라이드로 이동';
  el.addEventListener('click', e => {
    e.stopPropagation();
    if (t.kind === 'external' && t.url) {
      window.open(t.url, '_blank', 'noopener');
    } else if (t.kind === 'internal' && t.slide) {
      goTo(t.slide - 1);
    } else if (t.kind === 'relative' && typeof t.delta === 'number') {
      goTo(cur + t.delta);
    }
  });
  return el;
}

/* ── 뷰어 빌드 ──────────────────────────── */
function buildViewer(title) {
  fnameEl.textContent = title;
  htot.textContent = `총 ${slides.length} 슬라이드`;
  cur = 0;
  stage.querySelectorAll('.wcs').forEach(e => e.remove());
  listEl.innerHTML = '';
  wlc.classList.add('gone');

  slides.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'si' + (i === 0 ? ' on' : '');
    item.innerHTML = `
      <span class="si-n">${i + 1}</span>
      <div class="si-th" id="th${i}"><span class="si-ph">${i + 1}</span></div>
      <span class="si-ttl">${s.title}</span>`;
    item.addEventListener('click', () => goTo(i));
    listEl.appendChild(item);

    const wc  = document.createElement('div');
    wc.className = 'wcs' + (i === 0 ? ' on' : '');

    const ssw = document.createElement('div');
    ssw.className = 'ssw loading';

    const img = document.createElement('img');
    img.className = 'simg';
    img.alt = `슬라이드 ${i + 1}`;
    img.addEventListener('load', () => {
      ssw.classList.remove('loading');
      const th = $('th' + i);
      if (th) { th.innerHTML = ''; const ti = new Image(); ti.src = img.src; th.appendChild(ti); }
    });

    const sov = document.createElement('div');
    sov.className = 'sov';
    const fsbtn = document.createElement('button');
    fsbtn.className = 'sovbtn';
    fsbtn.title = '전체화면 (F)';
    fsbtn.innerHTML = '<i class="ti ti-maximize"></i>';
    fsbtn.addEventListener('click', openFs);
    sov.appendChild(fsbtn);

    const ovwrap = document.createElement('div');
    ovwrap.className = 'ovwrap';
    (s.overlays || []).forEach(o => ovwrap.appendChild(makeOverlayEl(o)));

    ssw.appendChild(img);
    ssw.appendChild(ovwrap);
    ssw.appendChild(sov);
    wc.appendChild(ssw);
    stage.insertBefore(wc, $('arL'));
    s._img = img;
    s._ssw = ssw;
  });

  sizeSurfs();
  updateUI();

  slides.forEach((s, i) =>
    setTimeout(() => { if (!s._img.src) s._img.src = s.url; }, i * 80));
}

/* ── 사이즈 조정 ────────────────────────── */
function sizeSurfs() {
  const r = stage.getBoundingClientRect();
  let w = r.width - 24, h = w / ratio;
  if (h > r.height - 24) { h = r.height - 24; w = h * ratio; }
  w = Math.floor(w); h = Math.floor(h);
  stage.querySelectorAll('.ssw').forEach(el => {
    el.style.width  = w + 'px';
    el.style.height = h + 'px';
  });
  updateFsSize();
}
window.addEventListener('resize', sizeSurfs);

/* ── 내비게이션 ─────────────────────────── */
function updateUI() {
  const n = slides.length; if (!n) return;
  hcnt.innerHTML  = `${cur + 1}<em>/ ${n}</em>`;
  pinfo.innerHTML = `<strong>${cur + 1}</strong> / ${n}`;
  cpf.style.width = ((cur + 1) / n * 100) + '%';
  listEl.querySelectorAll('.si').forEach((el, i) => el.classList.toggle('on', i === cur));
  const a = listEl.querySelector('.si.on');
  if (a) a.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  if (fsov.classList.contains('open')) updateFs();
}

function goTo(i) {
  if (!slides.length || i < 0 || i >= slides.length || i === cur) return;
  const sls = stage.querySelectorAll('.wcs');
  sls[cur].classList.add('out'); sls[cur].classList.remove('on');
  const p = cur;
  setTimeout(() => sls[p]?.classList.remove('out'), 260);
  cur = i; sls[cur].classList.add('on'); updateUI();
  [-1, 1, 2, 3].forEach(d => {
    const j = i + d;
    if (j >= 0 && j < slides.length && !slides[j]._img.src)
      slides[j]._img.src = slides[j].url;
  });
}

$('prevBtn').addEventListener('click', () => goTo(cur - 1));
$('nextBtn').addEventListener('click', () => goTo(cur + 1));
$('arL').addEventListener('click',     () => goTo(cur - 1));
$('arR').addEventListener('click',     () => goTo(cur + 1));
$('prog').addEventListener('click', function (e) {
  if (!slides.length) return;
  goTo(Math.min(slides.length - 1,
       Math.max(0, Math.round(e.offsetX / this.offsetWidth * (slides.length - 1)))));
});

document.addEventListener('keydown', e => {
  if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { goTo(cur - 1); e.preventDefault(); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  { goTo(cur + 1); e.preventDefault(); }
  if (e.key === 'Home') { goTo(0); e.preventDefault(); }
  if (e.key === 'End')  { goTo(slides.length - 1); e.preventDefault(); }
  if (e.key === 'Escape' && fsov.classList.contains('open')) closeFs();
  if ((e.key === 'f' || e.key === 'F') && slides.length) toggleFs();
});

let _tx = null;
stage.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive: true });
stage.addEventListener('touchend',   e => {
  if (_tx === null) return;
  const dx = e.changedTouches[0].clientX - _tx;
  if (Math.abs(dx) > 40) dx < 0 ? goTo(cur + 1) : goTo(cur - 1);
  _tx = null;
}, { passive: true });

/* ── 전체화면 ───────────────────────────── */
function updateFsSize() {
  if (!fsov.classList.contains('open')) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  let w = vw - 80, h = w / ratio;
  if (h > vh - 60) { h = vh - 60; w = h * ratio; }
  fssw.style.width  = Math.floor(w) + 'px';
  fssw.style.height = Math.floor(h) + 'px';
}
function updateFs() {
  if (!slides[cur]) return;
  fsimg.src = slides[cur].url;
  fscnt.textContent = `${cur + 1} / ${slides.length}`;
  let ovwrap = fssw.querySelector('.ovwrap');
  if (!ovwrap) {
    ovwrap = document.createElement('div');
    ovwrap.className = 'ovwrap';
    fssw.insertBefore(ovwrap, fssw.querySelector('.sov'));
  }
  ovwrap.innerHTML = '';
  (slides[cur].overlays || []).forEach(o => ovwrap.appendChild(makeOverlayEl(o)));
  updateFsSize();
}
function openFs() {
  if (!slides.length) return;
  fsov.classList.add('open');
  stage.querySelectorAll('.sovbtn:not(.act) i').forEach(i => i.className = 'ti ti-minimize');
  updateFs();
  if (fsov.requestFullscreen) fsov.requestFullscreen().catch(() => {});
}
function closeFs() {
  fsov.classList.remove('open');
  stage.querySelectorAll('.ssw .sovbtn i').forEach(i => i.className = 'ti ti-maximize');
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
}
function toggleFs() {
  fsov.classList.contains('open') ? closeFs() : openFs();
}

$('fscls').addEventListener('click', closeFs);
$('fnL').addEventListener('click', () => goTo(cur - 1));
$('fnR').addEventListener('click', () => goTo(cur + 1));
window.addEventListener('resize', () => { if (fsov.classList.contains('open')) updateFsSize(); });
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && fsov.classList.contains('open')) closeFs();
});

/* ── 시작 ───────────────────────────────── */
loadManifest();
</script>
</body>
</html>
